name = "wp-ai-gateway"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true
account_id = "e39eaf94f33092c4efd029d94ae1e9dd"

# KV Namespace for caching WordPress API responses
[[kv_namespaces]]
binding = "WP_CACHE"
id = "9b337083821343c4b38cc79d99a207ad"

# D1 Database for activity logging and config
[[d1_databases]]
binding = "WP_DB"
database_name = "site-pilot-ai"
database_id = "1528167f-8617-4a6b-aed8-fe50343d7b8a"

# R2 Bucket for media staging (optional)
# [[r2_buckets]]
# binding = "MEDIA_BUCKET"
# bucket_name = "wp-media-staging"

[vars]
ENVIRONMENT = "production"

# Secrets (set via wrangler secret put)
# - AUTHORIZED_TOKENS: Comma-separated API tokens (for REST API routes)
# - SITE_CONFIGS: JSON string of site configurations
#   Example: {"default":{"id":"default","name":"Main Site","url":"https://example.com","apiKey":"digid_xxx"}}
#
# MCP Endpoint:
# - POST /mcp - MCP Streamable HTTP endpoint (JSON-RPC 2.0)
# - No auth required (follows MCP protocol)
# - Uses 'default' site from SITE_CONFIGS or first configured site
# - Connect from Claude Desktop or other MCP clients
