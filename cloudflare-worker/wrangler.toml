name = "wp-ai-gateway"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true

# KV Namespace for caching WordPress API responses
[[kv_namespaces]]
binding = "WP_CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# D1 Database for activity logging and config
[[d1_databases]]
binding = "WP_DB"
database_name = "wp-ai-operator"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# R2 Bucket for media staging (optional)
# [[r2_buckets]]
# binding = "MEDIA_BUCKET"
# bucket_name = "wp-media-staging"

[vars]
ENVIRONMENT = "production"

# Secrets (set via wrangler secret put)
# - AUTHORIZED_TOKENS: Comma-separated API tokens
# - SITE_CONFIGS: JSON string of site configurations
